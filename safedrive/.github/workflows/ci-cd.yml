name: CI/CD — Build & Deploy SafeDrive

# Triggers: run on every push to main, and on pull requests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Analyse & Test
  # ─────────────────────────────────────────────
  analyze:
    name: Analyse & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true   # warn but don't block deploy

      - name: Analyse code (lint)
        run: flutter analyze --no-fatal-infos
        continue-on-error: true   # warn but don't block deploy

      - name: Run tests
        run: flutter test --no-pub
        continue-on-error: true   # no tests yet — won't fail the pipeline

  # ─────────────────────────────────────────────
  # JOB 2: Build Web
  # ─────────────────────────────────────────────
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: analyze          # only runs after analyze passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Build web (release)
        run: flutter build web --release --base-href /

      # Upload build/web as an artifact so the deploy job can use it
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to Vercel (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build            # only runs after build succeeds
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./build/web
          vercel-args: '--prod'
